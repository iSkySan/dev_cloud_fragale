apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracker-service
  namespace: logistream
  labels:
    app: tracker-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracker-service
  template:
    metadata:
      labels:
        app: tracker-service
    spec:
      containers:
        - name: tracker-service
          image: europe-west9-docker.pkg.dev/ynov-cloud-theo/tp2-registry/tp2-app:v1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: logistream-config
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: logistream-secrets
                  key: DB_URL
            - name: SERVICE_ROLE
              value: "tracker"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: tracker-service-svc
  namespace: logistream
spec:
  selector:
    app: tracker-service
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP